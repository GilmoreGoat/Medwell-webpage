<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" width="200" height="260">
  <defs>
    <linearGradient id="sunsetFlame" x1="0.2" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFE7A8"/>
      <stop offset="40%" stop-color="#FFB36A"/>
      <stop offset="75%" stop-color="#FF7A6B"/>
      <stop offset="100%" stop-color="#FF5C8A"/>
    </linearGradient>
    <radialGradient id="core" cx="0.5" cy="0.65" r="0.6">
      <stop offset="0%" stop-color="#FFF6D8" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFB36A" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer sweeping flame silhouette. Drawn as a single path so Framer
       Motion's pathLength animation can trace it during the splash. -->
  <path
    id="flamePath"
    filter="url(#softGlow)"
    fill="url(#sunsetFlame)"
    stroke="url(#sunsetFlame)"
    stroke-width="2"
    stroke-linejoin="round"
    d="M100 10
       C 120 50, 160 70, 150 120
       C 145 145, 115 150, 120 180
       C 123 200, 140 205, 140 225
       C 140 245, 115 255, 100 250
       C 85 255, 60 245, 60 225
       C 60 205, 77 200, 80 180
       C 85 150, 55 145, 50 120
       C 40 70, 80 50, 100 10 Z"
  />

  <!-- Inner glow / core -->
  <ellipse cx="100" cy="170" rx="28" ry="48" fill="url(#core)"/>
</svg>
